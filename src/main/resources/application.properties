spring.application.name=ledger-query-service
server.port=8081

# Read-side PostgreSQL (separate database from command side)
spring.datasource.url=jdbc:postgresql://${QUERY_DB_HOST:localhost}:${QUERY_DB_PORT:5432}/ledger_query
spring.datasource.username=${QUERY_DB_USERNAME:ledger_query}
spring.datasource.password=${QUERY_DB_PASSWORD:ledger_query}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

spring.jackson.serialization.write-dates-as-timestamps=false

management.endpoints.web.exposure.include=health,info

# Kafka – consumes from command-side topic
ledger.kafka.bootstrap-servers=${LEDGER_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
ledger.kafka.topics.events=ledger.events
ledger.kafka.consumer.group-id=ledger-query-projector

# Redis – balance cache
spring.data.redis.host=${LEDGER_REDIS_HOST:localhost}
spring.data.redis.port=${LEDGER_REDIS_PORT:6379}
spring.data.redis.timeout=2000ms

# Swagger/OpenAPI
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/swagger-ui/index.html
springdoc.api-docs.path=/v3/api-docs
springdoc.api-docs.enabled=true
springdoc.show-actuator=false

